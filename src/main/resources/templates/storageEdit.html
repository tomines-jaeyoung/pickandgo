<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>보관 신청 수정 - PICK & GO</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container section" style="max-width:560px;">
    <h2 style="text-align:center;">보관 물건 수정</h2>
    <p style="text-align:center;color:#6b6b6b;font-size:13px;margin-bottom:30px;">등록된 보관 신청 정보를 수정합니다.</p>

    <form id="storageForm" th:action="@{'/storage/' + ${storageRequest.id} + '/edit'}" method="post" enctype="multipart/form-data">
        <!-- 이미지 드롭존 -->
        <div class="drop-zone" id="dropZone" style="border: none; padding: 0; background: transparent; cursor: pointer; text-align: center;">
            <div class="preview" id="preview" style="width: 100%; border: 1px solid #718096; margin-bottom: 24px; display: block; overflow: hidden; background: #fafafa;">
                <img id="previewImg" th:src="${storageRequest.imageUrl != null} ? ${storageRequest.imageUrl} : '/img/container.jpg'" alt="미리보기" style="width: 100%; display: block; object-fit: cover; aspect-ratio: 4/3;">
            </div>
            
            <div style="margin-bottom: 24px;">
                <h3 style="font-size: 22px; font-weight: 700; margin: 0 0 10px; color: #1a1a1a; letter-spacing: -0.5px;">이미지를 업로드하고 보관하세요</h3>
                <p style="font-size: 13px; font-weight: bold; font-style: italic; margin: 0 0 4px; color: #4a5568;">PICK &amp; GO!</p>
                <p style="font-size: 13px; margin: 0; color: #718096;">버튼 클릭 한번으로 가구를 보관하세요!</p>
            </div>

            <input type="file" id="imageInput" name="image" accept="image/*" style="display:none;">
            <div>
                <button type="button" class="btn btn-outline btn-sm" style="border: 1px solid #1a1a1a; color: #1a1a1a; background: #fff; padding: 6px 16px; border-radius: 4px; font-size: 13px;" onclick="document.getElementById('imageInput').click()">✓ 이미지 변경</button>
            </div>
        </div>

        <div class="form-group" style="margin-top:24px;">
            <label>보관 물건 이름</label>
            <input type="text" name="itemName" th:value="${storageRequest.itemName}" required>
        </div>

        <div class="form-group">
            <label>무게 (kg)</label>
            <input type="number" id="weight" name="weight" min="1" th:value="${storageRequest.weight}" required>
        </div>

        <div class="form-row" style="display:flex; gap:16px;">
            <div class="form-group" style="flex:1;">
                <label>보관 시작일</label>
                <input type="date" id="startDate" name="startDate" th:value="${storageRequest.startDate}" required>
            </div>
            <div class="form-group" style="flex:1;">
                <label>보관 종료일</label>
                <input type="date" id="endDate" name="endDate" th:value="${storageRequest.endDate}" required>
            </div>
        </div>

        <!-- 비용 분석 버튼 -->
        <div style="margin-top: 16px;">
            <button type="button" id="analyzeBtn" class="btn btn-outline" style="width:100%; text-align:center;" onclick="calculate()">비용 재분석</button>
        </div>

        <!-- 분석 결과 영역 (처음엔 숨김) -->
        <div class="form-group" id="priceDisplayWrapper" style="display:none; background:#fdfdfd; padding:20px; border-radius:10px; margin-top:20px; border:1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);">
            <h4 style="margin:0 0 16px; font-size:15px; color:#1a202c; border-bottom:2px solid #edf2f7; padding-bottom:8px; font-weight:bold;">🔎 상세 예상 비용 분석</h4>
            
            <!-- 보관비용 계산 영역 -->
            <div style="margin-bottom: 18px;">
                <span style="font-size:11px; color:#718096; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">[ 보관비용 계산 ]</span>
                <div style="font-size:13px; color:#4a5568; line-height:24px; margin-top:6px;">
                    <div style="display:flex; justify-content:space-between;">
                        <span>기본요금</span>
                        <span>3,000원/일 × <span class="calc-days">0</span>일 = <span id="baseStorageCostText">0</span>원</span>
                    </div>
                    <!-- 무게 할증 행 (동적 노출) -->
                    <div id="weightExtraRow" style="display:none; justify-content:space-between; color:#dd6b20;">
                        <span>무게 할증 <span id="weightLabelText"></span></span>
                        <span>+<span id="extraRateText">0</span>원/일 × <span class="calc-days">0</span>일 = <span id="extraStorageCostText">0</span>원</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:6px; padding-top:6px; border-top:1px solid #edf2f7; font-weight:600;">
                        <span>보관비용 소계</span>
                        <span id="storageCostSubtotalText" style="color:#2d3748;">0원</span>
                    </div>
                </div>
            </div>

            <!-- 운수비용 계산 영역 -->
            <div style="margin-bottom: 18px;">
                <span style="font-size:11px; color:#718096; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">[ 운수비용 ]</span>
                <div style="font-size:13px; color:#4a5568; line-height:24px; margin-top:6px;">
                    <div style="display:flex; justify-content:space-between;">
                        <span>무게 기준 (<span id="transportWeightText">10kg 미만</span>, 1회)</span>
                        <span id="transportCostText">0원</span>
                    </div>
                </div>
            </div>

            <!-- 최종 총합 영역 -->
            <div style="display:flex; justify-content:space-between; margin-top:16px; padding-top:12px; border-top:2px solid #edf2f7; font-size:16px; font-weight:bold;">
                <span style="color:#1a202c;">최종 청구 비용 (총합)</span>
                <span id="totalCostText" style="color:#e53e3e;">0원</span>
            </div>
        </div>

        <!-- Hidden inputs for backend -->
        <input type="hidden" id="storageCost" name="storageCost" th:value="${storageRequest.storageCost}">
        <input type="hidden" id="transportCost" name="transportCost" th:value="${storageRequest.transportCost}">

        <div class="form-group" style="margin-top:16px;">
            <label>이름</label>
            <input type="text" name="name" th:value="${storageRequest.name}" required>
        </div>
        <div class="form-group">
            <label>주소</label>
            <input type="text" name="address" th:value="${storageRequest.address}" placeholder="주소를 입력해주세요" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" th:value="${storageRequest.email}" required>
        </div>
        <div class="form-group">
            <label>결제방법</label>
            <select name="bank">
                <option value="하나은행" th:selected="${storageRequest.bank == '하나은행'}">하나은행</option>
                <option value="국민은행" th:selected="${storageRequest.bank == '국민은행'}">국민은행</option>
                <option value="신한은행" th:selected="${storageRequest.bank == '신한은행'}">신한은행</option>
                <option value="카카오뱅크" th:selected="${storageRequest.bank == '카카오뱅크'}">카카오뱅크</option>
            </select>
        </div>

        <div class="form-row-btns" style="display:flex; gap:16px; margin-top:24px;">
            <a href="/mypage" class="btn btn-outline" style="flex:1; text-align:center;">취소</a>
            <button type="submit" id="submitBtn" class="btn btn-dark" style="flex:2;">수정 완료</button>
        </div>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    // 드래그앤드롭 파일 업로드 스크립트
    const dropZone = document.getElementById('dropZone');
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const dropLabel = document.getElementById('dropLabel');

    ['dragenter', 'dragover'].forEach(evt =>
        dropZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); dropZone.classList.add('active'); })
    );
    ['dragleave', 'drop'].forEach(evt =>
        dropZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); dropZone.classList.remove('active'); })
    );
    dropZone.addEventListener('drop', (e) => { const file = e.dataTransfer.files[0]; if (file) setFile(file); });
    imageInput.addEventListener('change', (e) => { const file = e.target.files[0]; if (file) setFile(file); });
    
    function setFile(file) {
        const dt = new DataTransfer(); dt.items.add(file); imageInput.files = dt.files;
        const reader = new FileReader();
        reader.onload = (e) => { previewImg.src = e.target.result; };
        reader.readAsDataURL(file);
    }

    // 날짜 피커 제한 및 요금 분석 스크립트
    const startInput = document.getElementById('startDate');
    const endInput = document.getElementById('endDate');
    const priceDisplay = document.getElementById('priceDisplayWrapper');
    const submitBtn = document.getElementById('submitBtn');

    // 오늘 날짜를 구하고 포맷팅 (KST 기준 로컬 오늘 구하기)
    const today = new Date();
    const offset = today.getTimezoneOffset() * 60000;
    const todayLocalDate = new Date(today.getTime() - offset).toISOString().split('T')[0];
    startInput.min = todayLocalDate;

    startInput.addEventListener('change', () => {
        if (startInput.value) {
            const nextDay = new Date(startInput.value);
            nextDay.setDate(nextDay.getDate() + 1);
            const nextDayLocalDate = new Date(nextDay.getTime() - offset).toISOString().split('T')[0];
            endInput.min = nextDayLocalDate;
            if (endInput.value && endInput.value < endInput.min) {
                endInput.value = endInput.min;
            }
        }
        invalidateAnalysis();
    });

    endInput.addEventListener('change', invalidateAnalysis);
    document.getElementById('weight').addEventListener('input', invalidateAnalysis);

    function invalidateAnalysis() {
        submitBtn.disabled = true;
        priceDisplay.style.display = 'none';
    }

    function calculate() {
        const weightVal = document.getElementById('weight').value;
        const startVal = startInput.value;
        const endVal = endInput.value;

        if (!weightVal || !startVal || !endVal) {
            alert("물건 무게와 보관 일정을 정확히 입력해주세요.");
            return;
        }

        const weight = parseInt(weightVal);
        if (weight < 1) {
            alert("무게는 1kg 이상이어야 합니다.");
            return;
        }

        const start = new Date(startVal);
        const end = new Date(endVal);
        const diffTime = end - start;
        const days = Math.round(diffTime / (1000 * 60 * 60 * 24));

        if (days <= 0) {
            alert("보관 종료일은 시작일보다 이후여야 합니다.");
            return;
        }

        // 보관비용 연산
        let dailyRate = 3000;
        if (weight >= 50) dailyRate += 5000;
        else if (weight >= 30) dailyRate += 3000;
        else if (weight >= 10) dailyRate += 1000;
        const storageCost = dailyRate * days;

        // 운수비용 연산
        let transportCost = 10000;
        if (weight >= 50) transportCost = 50000;
        else if (weight >= 30) transportCost = 35000;
        else if (weight >= 10) transportCost = 20000;

        const total = storageCost + transportCost;

        // 결과 노출 및 hidden input 세팅
        const baseStorage = 3000 * days;
        document.getElementById('baseStorageCostText').innerText = baseStorage.toLocaleString();
        
        // calc-days 클래스 전체에 일수 적용
        document.querySelectorAll('.calc-days').forEach(el => el.innerText = days);

        // 무게 할증 가산률 산출
        let extraRate = 0;
        let extraLabel = "";
        if (weight >= 50) { extraRate = 5000; extraLabel = "(50kg 이상)"; }
        else if (weight >= 30) { extraRate = 3000; extraLabel = "(30kg 이상)"; }
        else if (weight >= 10) { extraRate = 1000; extraLabel = "(10kg 이상)"; }

        const weightExtraRow = document.getElementById('weightExtraRow');
        if (extraRate > 0) {
            const extraStorage = extraRate * days;
            document.getElementById('weightLabelText').innerText = extraLabel;
            document.getElementById('extraRateText').innerText = extraRate.toLocaleString();
            document.getElementById('extraStorageCostText').innerText = extraStorage.toLocaleString();
            weightExtraRow.style.display = 'flex';
        } else {
            weightExtraRow.style.display = 'none';
        }

        document.getElementById('storageCostSubtotalText').innerText = storageCost.toLocaleString() + " 원";

        // 운수비용 기준명 세팅
        let transportLabel = "10kg 미만";
        if (weight >= 50) transportLabel = "50kg 이상";
        else if (weight >= 30) transportLabel = "30kg 이상";
        else if (weight >= 10) transportLabel = "10kg 이상";

        document.getElementById('transportWeightText').innerText = transportLabel;
        document.getElementById('transportCostText').innerText = transportCost.toLocaleString() + " 원";
        document.getElementById('totalCostText').innerText = total.toLocaleString() + " 원";

        document.getElementById('storageCost').value = storageCost;
        document.getElementById('transportCost').value = transportCost;

        priceDisplay.style.display = 'block';
        submitBtn.disabled = false;
    }

    // 초기 로딩 시 분석 실행
    window.addEventListener('DOMContentLoaded', () => {
        if (document.getElementById('weight').value && startInput.value && endInput.value) {
            calculate();
        }
    });
</script>
</body>
</html>
