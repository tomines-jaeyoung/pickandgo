<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>맡겨두기 - PICK & GO</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="form-wrapper">
    <h2>맡겨두기 신청</h2>
    <p style="font-size:13px;color:#6b6b6b;margin-top:-14px;margin-bottom:22px;">간편한 보관소에 임시 보관해드립니다.</p>
    <form th:action="@{/storage}" method="post">
        <div class="form-group">
            <label>이름</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>주소</label>
            <input type="text" name="address" placeholder="경기도 의정부시 가능동" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>결제방법</label>
            <select name="bank">
                <option value="하나은행">하나은행</option>
                <option value="국민은행">국민은행</option>
                <option value="신한은행">신한은행</option>
                <option value="카카오뱅크">카카오뱅크</option>
            </select>
        </div>
        <button type="submit" class="btn btn-dark btn-block">Submit</button>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
