<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header class="site-header" th:fragment="header">
    <div class="container">
        <a class="brand" href="/">
            <img class="brand-logo" src="/img/logo.png" alt="Logo" style="width:46px; height:46px; object-fit:contain;">
            <span class="brand-text">PICK &amp; GO<small>FURNITURE TREATMENT</small></span>
        </a>
        <nav class="nav-menu">
            <a href="/products">Products</a>
            <a href="/organize">Organize</a>
            <a href="/storage">Leave Luggage</a>
            <a href="/contact">Contact</a>
        </nav>
        <div class="nav-actions">
            <th:block th:if="${session.loginMember != null}">
                <a class="btn btn-sm" href="/mypage">👤 [[${session.loginMember.name}]]</a>
                <a class="btn btn-outline btn-sm" href="/logout">로그아웃</a>
            </th:block>
            <th:block th:unless="${session.loginMember != null}">
                <a class="btn btn-outline btn-sm" href="/login">Sign in</a>
                <a class="btn btn-dark btn-sm" href="/register">Register</a>
            </th:block>
        </div>
    </div>
</header>
</body>
</html>
