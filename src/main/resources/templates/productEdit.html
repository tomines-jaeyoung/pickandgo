<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - PICK & GO</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container section" style="max-width:560px;">
    <h2 style="text-align:center;">등록 정보 수정</h2>
    <p style="text-align:center;color:#6b6b6b;font-size:13px;margin-bottom:30px;">등록하신 상품/수거 신청 정보를 수정합니다.</p>

    <form id="productEditForm" th:action="@{'/products/' + ${product.id} + '/edit'}" method="post" enctype="multipart/form-data">
        <!-- 이미지 업로드/드롭존 -->
        <div class="drop-zone" id="dropZone" style="border: none; padding: 0; background: transparent; cursor: pointer; text-align: center;">
            <div class="preview" id="preview" style="width: 100%; border: 1px solid #718096; margin-bottom: 24px; display: block; overflow: hidden; background: #fafafa;">
                <img id="previewImg" th:src="${product.imageUrl != null} ? ${product.imageUrl} : '/img/default-cabinet.png'" alt="미리보기" style="width: 100%; display: block; object-fit: cover; aspect-ratio: 4/3;">
            </div>
            
            <div style="margin-bottom: 24px;">
                <h3 style="font-size: 22px; font-weight: 700; margin: 0 0 10px; color: #1a1a1a; letter-spacing: -0.5px;">이미지를 업로드하고 정리하세요</h3>
                <p style="font-size: 13px; font-weight: bold; font-style: italic; margin: 0 0 4px; color: #4a5568;">PICK &amp; GO!</p>
                <p style="font-size: 13px; margin: 0; color: #718096;">버튼 클릭 한번으로 가구를 정리하세요!</p>
            </div>

            <input type="file" id="imageInput" name="image" accept="image/*" style="display:none;">
            <div>
                <button type="button" class="btn btn-outline btn-sm" style="border: 1px solid #1a1a1a; color: #1a1a1a; background: #fff; padding: 6px 16px; border-radius: 4px; font-size: 13px;" onclick="document.getElementById('imageInput').click()">✓ 이미지 변경</button>
            </div>
        </div>

        <div class="form-group" style="margin-top:24px;">
            <label>상품 이름</label>
            <input type="text" name="name" th:value="${product.name}" required>
        </div>
        <div class="form-group">
            <label>가격 (KRW) <small style="color:#888;">(수거 항목일 경우 0원)</small></label>
            <input type="number" name="price" th:value="${product.price}" required>
        </div>
        <div class="form-group">
            <label>카테고리</label>
            <select name="category" required>
                <option th:each="c : ${categories}" th:value="${c}" th:text="${c.displayName}" th:selected="${product.category == c}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>지역</label>
            <input type="text" name="location" th:value="${product.location}" placeholder="예: 서울특별시 용산구 보광동" required>
        </div>
        <div class="form-group">
            <label>설명</label>
            <textarea name="description" th:text="${product.description}" rows="4"></textarea>
        </div>

        <div class="form-row-btns" style="display:flex; gap:16px; margin-top:24px;">
            <a href="/mypage" class="btn btn-outline" style="flex:1; text-align:center;">취소</a>
            <button type="submit" class="btn btn-dark" style="flex:2;">수정 완료</button>
        </div>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    // 드래그앤드롭
    const dropZone = document.getElementById('dropZone');
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const previewImg = document.getElementById('previewImg');
    const dropLabel = document.getElementById('dropLabel');

    // 드래그오버 시 피드백 스타일 적용
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.style.border = "2px dashed #ff6b6b";
        dropZone.style.borderRadius = "12px";
        dropZone.style.background = "#fff9f6";
        dropZone.style.padding = "20px";
        dropZone.style.transition = "all 0.2s";
    });

    const resetDragStyle = (e) => {
        e.preventDefault();
        e.stopPropagation();
        dropZone.style.border = "none";
        dropZone.style.background = "transparent";
        dropZone.style.padding = "0";
    };

    dropZone.addEventListener('dragleave', resetDragStyle);
    dropZone.addEventListener('drop', (e) => {
        resetDragStyle(e);
        const file = e.dataTransfer.files[0];
        if (file) setFile(file);
    });

    imageInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) setFile(file);
    });

    function setFile(file) {
        const dt = new DataTransfer();
        dt.items.add(file);
        imageInput.files = dt.files;
        const reader = new FileReader();
        reader.onload = (e) => {
            previewImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
