<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - PICK & GO'">상품 상세</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container detail-layout">
    <div class="detail-img">
        <img th:if="${product.imageUrl}" th:src="${product.imageUrl}" alt="">
        <span th:unless="${product.imageUrl}">No Image</span>
    </div>
    <div class="detail-info">
        <h1 th:text="${product.name}">상품명</h1>
        <div class="stars">
            ★★★★☆ <span style="color:#999;font-size:12px;" th:text="'(' + ${product.rating} + ')'"></span>
        </div>
        <p class="desc" th:text="${product.description}">상품 설명</p>
        <p style="font-size:13px;color:#6b6b6b;">📍 <span th:text="${product.location}">지역</span> · <span th:text="${product.category.displayName}">카테고리</span></p>
        <p class="price" th:text="${product.formattedPrice} + ' 원'">가격</p>

        <form th:action="@{'/cart/' + ${product.id}}" method="post" style="display:flex;gap:10px;">
            <button type="submit" class="btn btn-outline" style="flex:1;">장바구니에 추가</button>
            <a th:href="@{/cart}" class="btn btn-primary" style="flex:1;text-align:center;">지금 구매</a>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
