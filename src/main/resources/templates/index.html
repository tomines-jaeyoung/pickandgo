<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>PICK & GO - 가구 처리, 이제 클릭 한 번이면 끝</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<section class="hero-section">
    <div class="container">
        <h1>가구 처리, 이제 클릭 한 번이면 끝!</h1>
        <p>사진 촬영 → AI 분석 → 전문 업체 연결</p>

        <div class="game-wrap" id="game-wrap">

            <!-- 별 카운터 -->
            <div class="game-star-bar">⭐ <span id="g-stars">0</span></div>

            <!-- 미션 사람들 -->
            <div class="mission-row" id="mission-row"></div>

            <!-- 컨베이어 벨트 -->
            <div class="game-belt" id="game-belt">
                <div class="belt-vis"></div>
            </div>

            <!-- 서비스 구역 3개 -->
            <div class="game-zones">

                <!-- 정리하기 -->
                <div class="game-zone" id="zone-organize"
                     ondragover="event.preventDefault();this.classList.add('drag-over')"
                     ondragleave="if(!this.contains(event.relatedTarget))this.classList.remove('drag-over')"
                     ondrop="PG.handleDrop(event,'organize')">
                    <div class="zone-card-head">
                        <span class="zc-emoji">📦</span>
                        <span class="zc-name">정리하기</span>
                        <span class="zone-lv" id="lv-organize">Lv.1</span>
                        <button class="lv-up-btn" onclick="PG.tryLevelUp('organize')" title="레벨업">+</button>
                    </div>
                    <div class="zone-card-desc">불필요한 가구를 전문업체가 수거</div>
                    <div class="zone-actor" id="organize-body">
                        <div class="truck-wrap" id="g-truck">🚚</div>
                    </div>
                </div>

                <!-- 맡겨두기 -->
                <div class="game-zone" id="zone-storage"
                     ondragover="event.preventDefault();this.classList.add('drag-over')"
                     ondragleave="if(!this.contains(event.relatedTarget))this.classList.remove('drag-over')"
                     ondrop="PG.handleDrop(event,'storage')">
                    <div class="zone-card-head">
                        <span class="zc-emoji">🧳</span>
                        <span class="zc-name">맡겨두기</span>
                        <span class="zone-lv" id="lv-storage">Lv.1</span>
                        <button class="lv-up-btn" onclick="PG.tryLevelUp('storage')" title="레벨업">+</button>
                    </div>
                    <div class="zone-card-desc">간편한 보관소에 임시 보관</div>
                    <div class="zone-actor" id="storage-body"></div>
                </div>

                <!-- 판매하기 -->
                <div class="game-zone" id="zone-sell"
                     ondragover="event.preventDefault();this.classList.add('drag-over')"
                     ondragleave="if(!this.contains(event.relatedTarget))this.classList.remove('drag-over')"
                     ondrop="PG.handleDrop(event,'sell')">
                    <div class="zone-card-head">
                        <span class="zc-emoji">🤝</span>
                        <span class="zc-name">판매하기</span>
                        <span class="zone-lv" id="lv-sell">Lv.1</span>
                        <button class="lv-up-btn" onclick="PG.tryLevelUp('sell')" title="레벨업">+</button>
                    </div>
                    <div class="zone-card-desc">중고거래로 수익 창출</div>
                    <div class="zone-actor">
                        <div class="sell-queue" id="sell-queue"></div>
                    </div>
                </div>

            </div><!-- /game-zones -->
        </div><!-- /game-wrap -->
    </div>
</section>

<section class="container section">
    <p class="section-title">Sale</p>
    <h2 style="margin:0 0 24px;">최근 등록된 상품</h2>
    <div class="product-grid">
        <a th:each="p : ${latestProducts}" class="product-card" th:href="@{'/products/' + ${p.id}}">
            <div class="thumb">
                <img th:if="${p.imageUrl}" th:src="${p.imageUrl}" alt="">
                <span th:unless="${p.imageUrl}">No Image</span>
            </div>
            <div class="info">
                <p class="name" th:text="${p.name}">상품명</p>
                <p class="desc" th:text="${p.description}">설명</p>
                <p class="price" th:text="${p.formattedPrice} + ' 원'">가격</p>
            </div>
        </a>
        <p th:if="${#lists.isEmpty(latestProducts)}" class="empty-state">등록된 상품이 없습니다.</p>
    </div>

    <!-- 페이지네이션 (5번 사진 스타일) -->
    <div class="custom-pagination" th:if="${page.totalPages > 1}" style="display:flex; justify-content:center; align-items:center; gap:8px; margin-top:40px; font-family:'Inter', sans-serif; user-select:none;">
        <!-- Previous 버튼 -->
        <a th:if="${page.number > 0}"
           th:href="@{/(page=${page.number})}"
           style="text-decoration:none; color:#718096; font-size:13px; font-weight:500; display:flex; align-items:center; gap:4px; padding:6px 12px; border-radius:6px; border:1px solid transparent; transition:all 0.2s;">
           &larr; Previous
        </a>
        <span th:unless="${page.number > 0}"
              style="color:#cbd5e0; font-size:13px; font-weight:500; display:flex; align-items:center; gap:4px; padding:6px 12px; cursor:not-allowed;">
              &larr; Previous
        </span>

        <!-- 첫 페이지 (1) -->
        <span th:if="${page.number == 0}"
              style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:#1a1a1a; color:#fff; border-radius:6px; font-size:13px; font-weight:600; border:1px solid #1a1a1a;">1</span>
        <a th:unless="${page.number == 0}"
           th:href="@{/(page=1)}"
           style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:#4a5568; border-radius:6px; font-size:13px; font-weight:500; text-decoration:none; border:1px solid transparent; transition:all 0.2s;"
           onmouseover="this.style.background='#edf2f7'; this.style.borderColor='#edf2f7';"
           onmouseout="this.style.background='transparent'; this.style.borderColor='transparent';">1</a>

        <!-- 첫 번째 말줄임표 (...) -->
        <span th:if="${page.number + 1 > 4}"
              style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:#cbd5e0; font-size:13px;">...</span>

        <!-- 중간 페이지들 (현재 페이지 ±2) -->
        <th:block th:if="${page.totalPages > 2}"
                  th:each="i : ${#numbers.sequence(
                      T(java.lang.Math).max(2, page.number + 1 - 2),
                      T(java.lang.Math).min(page.totalPages - 1, page.number + 1 + 2))}">
            <span th:if="${i == page.number + 1}"
                  style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:#1a1a1a; color:#fff; border-radius:6px; font-size:13px; font-weight:600; border:1px solid #1a1a1a;"
                  th:text="${i}">2</span>
            <a th:unless="${i == page.number + 1}"
               th:href="@{/(page=${i})}"
               th:text="${i}"
               style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:#4a5568; border-radius:6px; font-size:13px; font-weight:500; text-decoration:none; border:1px solid transparent; transition:all 0.2s;"
               onmouseover="this.style.background='#edf2f7'; this.style.borderColor='#edf2f7';"
               onmouseout="this.style.background='transparent'; this.style.borderColor='transparent';">2</a>
        </th:block>

        <!-- 두 번째 말줄임표 (...) -->
        <span th:if="${page.number + 1 < page.totalPages - 3}"
              style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:#cbd5e0; font-size:13px;">...</span>

        <!-- 마지막 페이지 -->
        <th:block th:if="${page.totalPages > 1}">
            <span th:if="${page.number + 1 == page.totalPages}"
                  style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; background:#1a1a1a; color:#fff; border-radius:6px; font-size:13px; font-weight:600; border:1px solid #1a1a1a;"
                  th:text="${page.totalPages}">100</span>
            <a th:unless="${page.number + 1 == page.totalPages}"
               th:href="@{/(page=${page.totalPages})}"
               th:text="${page.totalPages}"
               style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:#4a5568; border-radius:6px; font-size:13px; font-weight:500; text-decoration:none; border:1px solid transparent; transition:all 0.2s;"
               onmouseover="this.style.background='#edf2f7'; this.style.borderColor='#edf2f7';"
               onmouseout="this.style.background='transparent'; this.style.borderColor='transparent';">100</a>
        </th:block>

        <!-- Next 버튼 -->
        <a th:if="${page.number + 1 < page.totalPages}"
           th:href="@{/(page=${page.number + 2})}"
           style="text-decoration:none; color:#718096; font-size:13px; font-weight:500; display:flex; align-items:center; gap:4px; padding:6px 12px; border-radius:6px; border:1px solid transparent; transition:all 0.2s;">
           Next &rarr;
        </a>
        <span th:unless="${page.number + 1 < page.totalPages}"
              style="color:#cbd5e0; font-size:13px; font-weight:500; display:flex; align-items:center; gap:4px; padding:6px 12px; cursor:not-allowed;">
              Next &rarr;
        </span>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="/js/game.js" defer></script>
</body>
</html>
