<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장바구니 - PICK & GO</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container section" style="max-width:760px;">
    <h2 style="text-align:center; margin-bottom:10px;">장바구니</h2>
    <p style="text-align:center; color:#6b6b6b; font-size:13px; margin-bottom:30px;">선택하신 소중한 가구들을 결제 및 신청하실 수 있습니다.</p>

    <p th:if="${#lists.isEmpty(items)}" class="empty-state" style="text-align:center; padding:60px 0; color:#888;">장바구니가 비어있습니다.</p>

    <div th:unless="${#lists.isEmpty(items)}">
        <form id="checkoutForm" th:action="@{/cart/checkout}" method="post">
            <table class="simple-table">
                <thead>
                    <tr>
                        <th style="width: 50px; text-align: center;">
                            <input type="checkbox" id="selectAll" checked onclick="toggleAll(this)" style="width:16px; height:16px; cursor:pointer;">
                        </th>
                        <th>상품명</th>
                        <th>카테고리</th>
                        <th>가격</th>
                        <th style="width: 80px; text-align: center;">관리</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${items}">
                        <td style="text-align: center; vertical-align: middle;">
                            <input type="checkbox" name="itemIds" th:value="${p.id}" class="cart-checkbox" th:data-price="${p.price}" checked onclick="updateTotal()" style="width:16px; height:16px; cursor:pointer;">
                        </td>
                        <td style="vertical-align: middle;">
                            <a th:href="@{'/products/' + ${p.id}}" th:text="${p.name}" style="font-weight:600; text-decoration:none; color:#1a1a1a;"></a>
                        </td>
                        <td th:text="${p.category.displayName}" style="vertical-align: middle;"></td>
                        <td th:text="${p.formattedPrice} + ' 원'" style="vertical-align: middle; font-weight:bold;"></td>
                        <td style="text-align: center; vertical-align: middle;">
                            <button type="button" class="btn btn-outline btn-sm" th:onclick="'removeCartItem(' + ${p.id} + ')'" style="color:#e03131; border-color:#ffc9c9; padding:5px 10px; font-size:12px; border-radius:4px;">삭제</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div style="margin-top:24px; padding:20px; background:#f8f9fa; border-radius:8px; border:1px solid #e9ecef; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:15px; color:#495057;">선택 상품 결제 합계:</span>
                <strong style="font-size:22px; color:#1a1a1a;"><span id="totalPriceText" th:text="${#numbers.formatInteger(total, 0, 'COMMA')}"></span> 원</strong>
            </div>

            <div style="margin-top:24px; display:flex; gap:16px; justify-content:flex-end;">
                <a href="/products" class="btn btn-outline" style="min-width:120px; text-align:center;">쇼핑 계속하기</a>
                <button type="submit" id="checkoutBtn" class="btn btn-dark" style="min-width:160px;">선택 상품 구매하기</button>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script>
    function updateTotal() {
        let total = 0;
        const checked = document.querySelectorAll('.cart-checkbox:checked');
        checked.forEach(cb => {
            total += parseInt(cb.getAttribute('data-price'));
        });
        document.getElementById('totalPriceText').innerText = total.toLocaleString();

        const checkoutBtn = document.getElementById('checkoutBtn');
        if (checked.length === 0) {
            checkoutBtn.disabled = true;
        } else {
            checkoutBtn.disabled = false;
        }
    }

    function toggleAll(master) {
        const checkboxes = document.querySelectorAll('.cart-checkbox');
        checkboxes.forEach(cb => {
            cb.checked = master.checked;
        });
        updateTotal();
    }

    function removeCartItem(productId) {
        if (!confirm("장바구니에서 삭제하시겠습니까?")) return;
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/cart/remove/' + productId;
        document.body.appendChild(form);
        form.submit();
    }
</script>
</body>
</html>
